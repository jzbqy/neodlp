on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Draft release tag (e.g. v0.4.5-chinese)'
        required: true
        default: 'v0.0.0-chinese'

name: 🪟 Windows Only Build
jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target_platform: 'win32'
            target_arch: 'x64'
            args: '--target x86_64-pc-windows-msvc --config ./src-tauri/tauri.windows-x86_64.conf.json'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v5

      - name: 📦 Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: 🛠️ install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 🛠️ Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 🛠️ Install frontend dependencies
        run: npm install

      - name: 📥 Download binaries
        run: npm run download -- ${{ matrix.target_platform }} ${{ matrix.target_arch }}

      - name: 📄 Read and Process CHANGELOG (Windows)
        id: changelog_windows
        shell: pwsh
        run: |
            if (Test-Path "CHANGELOG.md") {
                $version_num = "${{ inputs.tag_name || github.ref_name }}" -replace '^v([0-9]+\.[0-9]+\.[0-9]+)(-.*)?$','$1'
                $content = Get-Content -Path CHANGELOG.md -Raw
                $content = $content -replace '<release_tag>', "${{ inputs.tag_name || github.ref_name }}"
                $content = $content -replace '<version>', "$version_num"
                "content<<EOF" >> $env:GITHUB_OUTPUT
                $content >> $env:GITHUB_OUTPUT
                "EOF" >> $env:GITHUB_OUTPUT
            } else {
                "content=No changelog found" >> $env:GITHUB_OUTPUT
            }

      - name: 🚀 Build with Tauri
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
        with:
          tagName: ${{ inputs.tag_name || github.ref_name }}
          releaseName: ${{ github.event.repository.name }}-${{ inputs.tag_name || github.ref_name }}
          releaseBody: |
            # NeoDLP 中文版本
            
            这是包含中文支持的 NeoDLP 构建版本。
            
            ## 安装包
            - **.exe** - NSIS 安装程序（推荐）
            - **.msi** - Windows Installer 安装程序
            - **-portable.zip** - 便携版（解压即可使用，无需安装）
            
            ## 功能
            - ✨ 内置中文支持
            - 🌐 在设置中可以切换英文/中文
            - 🎬 原有的所有功能保持不变
            
            ${{ steps.changelog_windows.outputs.content }}
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: 📦 Create Portable Version
        id: create_portable
        shell: pwsh
        run: |
            # Get version without v prefix
            $tagName = "${{ inputs.tag_name || github.ref_name }}".TrimStart('v')
            $productName = "NeoDLP"
            $portableZipName = "${productName}_${tagName}_x64-portable.zip"
            $portableZipPath = Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath $portableZipName
            
            Write-Host "Looking for build artifacts..."
            
            # Find NSIS bundle (which has the portable structure we need)
            $nsisBundleDirs = @(Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" -Directory -ErrorAction SilentlyContinue)
            
            if ($nsisBundleDirs) {
                Write-Host "Found NSIS bundle dirs"
                
                # Find the unzipped portable dir or the exe to copy
                $portableDir = Join-Path -Path $env:RUNNER_TEMP -ChildPath "neodlp-portable"
                New-Item -ItemType Directory -Path $portableDir -Force
                
                # Check for .nsis.7z or similar that has the full package
                # Let's just copy the main exe and necessary files for a minimal portable build
                Write-Host "Copying main executable..."
                
                $mainExe = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release" -Filter "neodlp.exe" -ErrorAction SilentlyContinue
                if ($mainExe) {
                    Copy-Item -Path $mainExe.FullName -Destination $portableDir
                    
                    # Also copy the bundle/nsis/NeoDLP... dir contents if it exists
                    $nsisDirs = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" -Directory -Filter "*NeoDLP*" -ErrorAction SilentlyContinue
                    
                    if ($nsisDirs) {
                        Write-Host "Copying bundle contents from: $($nsisDirs[0].FullName)"
                        Copy-Item -Path "$($nsisDirs[0].FullName)\*" -Destination $portableDir -Recurse
                    } else {
                        # Just copy whatever else we have in the release dir
                        Write-Host "Copying other files..."
                        Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release" -File -ErrorAction SilentlyContinue | Where-Object {
                            $_.Extension -ne ".exe" -or $_.Name -eq "neodlp.exe"
                        } | Copy-Item -Destination $portableDir
                    }
                    
                    Write-Host "Portable directory contents:"
                    Get-ChildItem -Path $portableDir -Recurse | Select-Object FullName, Length
                    
                    Compress-Archive -Path "$portableDir\*" -DestinationPath $portableZipPath -Force
                    
                    if (Test-Path $portableZipPath) {
                        $fileSize = (Get-Item $portableZipPath).Length / 1MB
                        Write-Host "Portable zip created successfully at: $portableZipPath (Size: $([math]::Round($fileSize, 2)) MB)"
                        "portable_zip_path=$portableZipPath" >> $env:GITHUB_OUTPUT
                        "portable_zip_name=$portableZipName" >> $env:GITHUB_OUTPUT
                    } else {
                        Write-Host "Failed to create portable zip"
                    }
                } else {
                    Write-Host "Main exe not found!"
                }
            } else {
                Write-Host "No NSIS bundles found!"
            }

      - name: 📤 Upload Portable Zip to Release
        if: steps.create_portable.outputs.portable_zip_path
        shell: pwsh
        run: |
            $zipPath = "${{ steps.create_portable.outputs.portable_zip_path }}"
            $zipName = "${{ steps.create_portable.outputs.portable_zip_name }}"
            
            if (Test-Path $zipPath) {
                Write-Host "Uploading portable zip to release..."
                
                # Use gh CLI to upload
                gh release upload "${{ inputs.tag_name || github.ref_name }}" "$zipPath" --repo "${{ github.repository }}"
            }
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
